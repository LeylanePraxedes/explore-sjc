<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dimensionamento</title>
    <style>

.div1{
    width: 400px
    height: 200px;
    border: 1px solid red;
    box-sizing: border-box;
}

.div2{
    width: 400px;
    height: 200px;
    padding: 30px;
    border: 1px solid rgb(19, 106, 32);
}

    </style>

</head>
<body>
    <div1 class="div1"></div1>
    <br>
    <br>
    <div2 class="div2"></div2>

</body>
</html>
