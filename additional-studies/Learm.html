<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Card</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 280px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100px;
      border-radius: 50%;
      margin-bottom: 15px;
    }

    h2 {
      margin: 10px 0 5px;
    }

    p {
      color: gray;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #667eea;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
    }
  </style>
</head>

<body>

  <div class="card">
    <img src="https://i.pravatar.cc/100" alt="foto">
    <h2>Leylane ✨</h2>
    <p>Análise e desenvolvimento de sistemas </p>
    <button onclick="alert('Você consegue 🚀')">Me clique</button>
  </div>

</body>
</html>
